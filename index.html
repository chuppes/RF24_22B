<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>📚 Расписание РФ24-22Б</title>
    
    <!-- PWA мета-теги -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="📚 Расписание">
    <link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 180 180'%3E%3Crect width='180' height='180' rx='36' fill='%23667eea'/%3E%3Ctext x='90' y='120' font-family='Arial' font-size='100' text-anchor='middle'%3E📚%3C/text%3E%3C/svg%3E">
    <meta name="theme-color" content="#0071e3">
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='6' fill='%23667eea'/%3E%3Ctext x='16' y='22' font-family='Arial' font-size='18' text-anchor='middle'%3E📚%3C/text%3E%3C/svg%3E">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Helvetica Neue', 'Helvetica', 'SF Pro Text', 'Segoe UI Emoji', 'Apple Color Emoji', sans-serif;
            font-weight: 950;
            min-height: 100vh;
            transition: all 0.3s ease;
        }

        body.theme-apple {
            --bg-glass: rgba(255, 255, 255, 0.75);
            --border-glass: rgba(255, 255, 255, 0.4);
            --accent: #0071e3;
            --accent-hover: #0077ed;
            --text: #1d1d1f;
            --text-secondary: #424245;
            --gradient-start: #667eea;
            --gradient-mid1: #764ba2;
            --gradient-mid2: #f093fb;
            --gradient-mid3: #4facfe;
            --gradient-end: #00f2fe;
        }

        body.theme-neon {
            --bg-glass: rgba(0, 0, 0, 0.75);
            --border-glass: rgba(255, 0, 255, 0.6);
            --accent: #ff00ff;
            --accent-hover: #ff66ff;
            --text: #ffffff;
            --text-secondary: #cccccc;
            --gradient-start: #ff00ff;
            --gradient-mid1: #00ffff;
            --gradient-mid2: #ff00ff;
            --gradient-mid3: #00ffff;
            --gradient-end: #ff00ff;
        }

        body.theme-nature {
            --bg-glass: rgba(255, 255, 255, 0.85);
            --border-glass: rgba(0, 100, 0, 0.3);
            --accent: #2e7d32;
            --accent-hover: #1b5e20;
            --text: #1d1d1f;
            --text-secondary: #424245;
            --gradient-start: #43a047;
            --gradient-mid1: #66bb6a;
            --gradient-mid2: #81c784;
            --gradient-mid3: #a5d6a7;
            --gradient-end: #c8e6c9;
        }

        body.theme-cosmos {
            --bg-glass: rgba(10, 10, 30, 0.85);
            --border-glass: rgba(100, 100, 200, 0.5);
            --accent: #7c3aed;
            --accent-hover: #8b5cf6;
            --text: #ffffff;
            --text-secondary: #cccccc;
            --gradient-start: #1e1b4b;
            --gradient-mid1: #312e81;
            --gradient-mid2: #4338ca;
            --gradient-mid3: #4f46e5;
            --gradient-end: #6366f1;
        }

        @keyframes gradientShift {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }

        @keyframes starTwinkle {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 1; }
        }

        @keyframes jump {
            0% { transform: scale(1); }
            50% { transform: scale(0.95) translateY(-5px); }
            100% { transform: scale(1); }
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        @keyframes pulse-glow {
            0%, 100% { box-shadow: 0 0 20px rgba(0, 113, 227, 0.3); }
            50% { box-shadow: 0 0 30px rgba(0, 113, 227, 0.5); }
        }

        .gradient-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -2;
            background: linear-gradient(135deg, var(--gradient-start) 0%, var(--gradient-mid1) 25%, var(--gradient-mid2) 50%, var(--gradient-mid3) 75%, var(--gradient-end) 100%);
            background-size: 400% 400%;
            animation: gradientShift 15s ease infinite;
        }

        body.theme-cosmos .gradient-bg::before {
            content: '';
            position: absolute;
            width: 100%;
            height: 100%;
            background: radial-gradient(2px 2px at 20px 30px, #fff, transparent),
                        radial-gradient(2px 2px at 80px 150px, #fff, transparent),
                        radial-gradient(3px 3px at 200px 50px, #fff, transparent),
                        radial-gradient(1px 1px at 350px 200px, #fff, transparent),
                        radial-gradient(2px 2px at 500px 100px, #fff, transparent),
                        radial-gradient(2px 2px at 650px 300px, #fff, transparent),
                        radial-gradient(3px 3px at 800px 80px, #fff, transparent),
                        radial-gradient(1px 1px at 950px 250px, #fff, transparent);
            background-repeat: no-repeat;
            opacity: 0.6;
            animation: starTwinkle 3s ease infinite;
        }

        .gradient-bg::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(2px);
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px 24px;
        }

        .glass {
            background: var(--bg-glass);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border-glass);
        }

        .header {
            text-align: center;
            padding: 48px 32px;
            border-radius: 60px;
            margin-bottom: 32px;
        }

        .header h1 {
            font-size: clamp(32px, 6vw, 48px);
            font-weight: 950;
            background: linear-gradient(135deg, var(--text) 0%, var(--accent) 100%);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 12px;
        }

        .header .group {
            font-size: clamp(16px, 4vw, 20px);
            font-weight: 950;
            color: var(--text-secondary);
        }

        .next-pair {
            background: var(--bg-glass);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border-glass);
            border-radius: 60px;
            padding: 32px 40px;
            text-align: center;
            margin-bottom: 32px;
        }

        .next-pair-label {
            font-size: 16px;
            color: var(--text-secondary);
            margin-bottom: 16px;
        }

        .next-pair-time {
            font-size: clamp(32px, 8vw, 52px);
            font-weight: 950;
            color: var(--accent);
            margin-bottom: 12px;
        }

        .next-pair-name {
            font-size: 18px;
            font-weight: 950;
            margin-top: 8px;
            color: var(--text);
        }

        .control-bar {
            background: var(--bg-glass);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border-glass);
            border-radius: 60px;
            padding: 12px 20px;
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            justify-content: center;
            margin-bottom: 40px;
        }

        .btn {
            background: transparent;
            border: none;
            padding: 12px 28px;
            border-radius: 40px;
            font-size: 16px;
            font-weight: 950;
            font-family: inherit;
            color: var(--text);
            cursor: pointer;
            transition: all 0.2s ease;
            display: inline-flex;
            align-items: center;
            gap: 10px;
        }

        .btn-primary {
            background: var(--accent);
            color: white;
        }

        .btn-primary:hover {
            background: var(--accent-hover);
            transform: scale(1.02);
        }

        .btn:hover {
            background: var(--bg-glass);
            transform: scale(1.02);
        }

        .jump-animation {
            animation: jump 0.3s ease;
        }

        .theme-selector {
            background: var(--bg-glass);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border-glass);
            border-radius: 60px;
            padding: 6px;
            display: inline-flex;
            gap: 6px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .theme-btn {
            background: transparent;
            border: none;
            padding: 8px 20px;
            border-radius: 40px;
            font-size: 14px;
            font-weight: 950;
            cursor: pointer;
            color: var(--text);
            transition: all 0.2s;
        }

        .theme-btn.active {
            background: var(--accent);
            color: white;
        }

        .group-selector {
            background: var(--bg-glass);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border-glass);
            border-radius: 60px;
            padding: 6px;
            display: inline-flex;
            gap: 6px;
        }

        .group-btn {
            background: transparent;
            border: none;
            padding: 8px 20px;
            border-radius: 40px;
            font-size: 14px;
            font-weight: 950;
            cursor: pointer;
            color: var(--text);
            transition: all 0.2s;
        }

        .group-btn.active {
            background: var(--accent);
            color: white;
        }

        .mic-btn, .qr-toggle-btn, .ambient-btn, .share-btn {
            background: var(--bg-glass);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border-glass);
            border-radius: 60px;
            padding: 12px 28px;
            font-size: 16px;
            font-weight: 950;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            color: var(--text);
        }

        .mic-btn.listening {
            animation: pulse 1s infinite;
            background: #ff3b30;
            color: white;
        }

        select.btn {
            background: var(--bg-glass);
            cursor: pointer;
        }

        select.btn option {
            background: var(--bg-glass);
            color: var(--text);
        }

        .qr-popup {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0.9);
            background: var(--bg-glass);
            backdrop-filter: blur(40px);
            border: 2px solid var(--accent);
            border-radius: 60px;
            padding: 32px 40px;
            z-index: 1000;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }

        .qr-popup.show {
            opacity: 1;
            visibility: visible;
            transform: translate(-50%, -50%) scale(1);
        }

        .qr-popup .qr-code {
            background: white;
            padding: 20px;
            border-radius: 40px;
        }

        .close-qr {
            position: absolute;
            top: 15px;
            right: 25px;
            background: none;
            border: none;
            font-size: 28px;
            cursor: pointer;
            color: var(--text);
        }

        .qr-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(5px);
            z-index: 999;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease;
        }

        .qr-overlay.show {
            opacity: 1;
            visibility: visible;
        }

        .schedule-grid {
            display: flex;
            flex-direction: column;
            gap: 24px;
            margin-bottom: 48px;
        }

        .day-card {
            background: var(--bg-glass);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border-glass);
            border-radius: 48px;
            overflow: hidden;
        }

        .day-header {
            padding: 28px 32px 20px;
            border-bottom: 1px solid var(--border-glass);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
        }

        .day-header h2 {
            font-size: clamp(22px, 5vw, 28px);
            font-weight: 950;
            display: flex;
            align-items: center;
            gap: 12px;
            color: var(--text);
        }

        .week-badge {
            font-size: 14px;
            color: var(--accent);
            background: var(--bg-glass);
            padding: 6px 16px;
            border-radius: 30px;
        }

        .pairs-list {
            padding: 20px 28px 28px;
        }

        .pair-card {
            background: var(--bg-glass);
            border-radius: 28px;
            padding: 20px 24px;
            margin-bottom: 14px;
            border: 1px solid var(--border-glass);
            transition: all 0.2s;
        }

        .pair-card:last-child {
            margin-bottom: 0;
        }

        .pair-card:hover {
            border-color: var(--accent);
            transform: translateX(8px);
        }

        .pair-card.current {
            border: 2px solid var(--accent);
            animation: pulse-glow 2s infinite;
        }

        .pair-header {
            display: flex;
            justify-content: space-between;
            flex-wrap: wrap;
            margin-bottom: 12px;
            gap: 8px;
        }

        .pair-number {
            font-size: 18px;
            font-weight: 950;
            color: var(--accent);
        }

        .pair-time {
            font-size: 14px;
            color: var(--text-secondary);
        }

        .pair-name {
            font-size: 17px;
            font-weight: 950;
            margin: 12px 0 8px;
            color: var(--text);
        }

        .pair-teacher {
            font-size: 14px;
            color: #34c759;
            margin-bottom: 6px;
        }

        .pair-room {
            font-size: 14px;
            color: #ff9f0a;
        }

        .empty-message {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-secondary);
            font-weight: 950;
        }

        .footer {
            text-align: center;
            padding: 32px 20px;
            color: var(--text-secondary);
            font-size: 13px;
            font-weight: 950;
            margin-top: 20px;
        }

        #offlineToast {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: #ff3b30;
            color: white;
            padding: 12px 24px;
            border-radius: 50px;
            z-index: 10000;
            display: none;
            backdrop-filter: blur(10px);
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
            font-weight: 600;
            white-space: nowrap;
        }

        @media (max-width: 768px) {
            .container { padding: 16px; }
            .header { padding: 32px 20px; margin-bottom: 24px; }
            .next-pair { padding: 24px 20px; margin-bottom: 24px; }
            .control-bar { padding: 12px; gap: 8px; margin-bottom: 28px; }
            .btn, .mic-btn, .qr-toggle-btn, .ambient-btn, .share-btn { padding: 10px 20px; font-size: 14px; }
            .theme-selector { width: 100%; justify-content: space-around; }
            .group-selector { width: 100%; justify-content: space-around; }
            .theme-btn, .group-btn { padding: 6px 14px; font-size: 12px; }
            .day-header { padding: 20px 24px 16px; flex-direction: column; gap: 12px; align-items: flex-start; }
            .pairs-list { padding: 16px 20px 20px; }
            .pair-card { padding: 16px 18px; }
            .qr-popup { width: 85%; padding: 24px 20px; }
            .qr-popup .qr-code canvas { width: 150px !important; height: 150px !important; }
            #offlineToast { white-space: normal; width: 90%; text-align: center; }
        }

        @media (max-width: 480px) {
            .btn, .mic-btn, .qr-toggle-btn, .ambient-btn, .share-btn { width: 100%; justify-content: center; }
            .pair-header { flex-direction: column; align-items: flex-start; }
        }
    </style>
</head>
<body class="theme-apple">
    <div class="gradient-bg"></div>
    
    <div id="offlineToast">📡 Нет подключения к интернету. Работаем офлайн 💾</div>

    <div class="container">
        <div class="header glass">
            <h1>🎓 Расписание занятий</h1>
            <div class="group">👥 РФ24-22Б</div>
        </div>

        <div class="next-pair glass">
            <div class="next-pair-label">⏰ Следующая пара</div>

            <div class="next-pair-name" id="nextPairName"></div>
        </div>

        <div class="control-bar glass">
            <button class="btn btn-primary" id="todayBtn">📅 Сегодня</button>

            <select id="daySelect" class="btn" style="background: var(--bg-glass);">

                <option value="friday">📅 Пятница</option>
                <option value="saturday">📅 Суббота</option>
                <option value="sunday">📅 Воскресенье</option>

            <div class="group-selector">
                <button class="group-btn active" data-group="1">1️⃣ 1 подгруппа</button>
                <button class="group-btn" data-group="2">2️⃣ 2 подгруппа</button>
            </div>

            <div class="theme-selector">
                <button class="theme-btn active" data-theme="apple">🍎 Apple</button>
                <button class="theme-btn" data-theme="neon">🌈 Неон</button>
                <button class="theme-btn" data-theme="nature">🌿 Природа</button>
                <button class="theme-btn" data-theme="cosmos">🌌 Космос</button>
            </div>
            <button class="mic-btn" id="micBtn">🎤 Голос</button>
            <button class="ambient-btn" id="ambientBtn">🎵 Эмбиент вкл</button>
            <button class="share-btn" id="shareBtn">📤 Поделиться</button>
            <button class="qr-toggle-btn" id="qrToggleBtn">📱 QR-код</button>
        </div>

        <div id="scheduleContainer" class="schedule-grid">
            <div class="empty-message">✨ Загрузка расписания...</div>
        </div>

        <div class="footer">
            ✅ Проект Максима Иванова | 🎓 РФ24-22Б
        </div>
    </div>

    <div class="qr-overlay" id="qrOverlay"></div>
    <div class="qr-popup" id="qrPopup">
        <button class="close-qr" id="closeQrBtn">&times;</button>
        <div style="text-align: center;">
            <h3 style="margin-bottom: 20px; color: var(--text);">📱 Отсканируй QR-код</h3>
            <div id="qrCode" class="qr-code"></div>
            <p style="margin-top: 20px; color: var(--text-secondary);">📸 Наведи камеру → откроет расписание</p>
        </div>
    </div>

    <script>
        // ========== ФУНКЦИЯ ПОЛУЧЕНИЯ ЭМОДЗИ ДЛЯ ПРЕДМЕТА ==========
        function getEmojiForSubject(subjectName) {
            const name = subjectName.toLowerCase();
            if (name.includes('базы данных') || name.includes('бд')) return '🗄️';
            if (name.includes('фотоник')) return '💡';
            if (name.includes('оптическ')) return '🔬';
            if (name.includes('физик')) return '⚛️';
            if (name.includes('иностранн') || name.includes('англ')) return '🌍';
            if (name.includes('математической физики') || name.includes('ммиф')) return '📐';
            if (name.includes('теория вероятност')) return '🎲';
            if (name.includes('программирован')) return '💻';
            if (name.includes('физическая культур') || name.includes('физра')) return '🏃';
            if (name.includes('деловая коммуникац') || name.includes('русск')) return '💬';
            if (name.includes('лекция')) return '📖';
            if (name.includes('лаб')) return '🧪';
            if (name.includes('пр. занятие') || name.includes('практич')) return '✏️';
            return '📚';
        }

                    5: { time: '15:55-17:30', name: 'Основы фотоники (лаб. работа)', teacher: 'Ципотан А. С.', room: 'Корпус №12, ауд. 2-24а' }
                }
            },
            tuesday: {

                },
                even: {
                    3: { time: '12:00-13:35', name: 'Физика (пр. занятие)', teacher: 'Балаев Д. А.', room: 'Корпус №12, ауд. 4-01' },
                    4: { time: '14:10-15:45', name: 'Основы фотоники (лекция)', teacher: 'Ципотан А. С.', room: 'Корпус №12, ауд. 3-19в' }
                }
            },

        const daysRu = {

        };
        
        const daysEmoji = {

        };
        
        const daysOrder = ['monday', 'tuesday', 'wednesday', 'thursday', 'friday', 'saturday', 'sunday'];
        const daysMap = ['sunday', 'monday', 'tuesday', 'wednesday', 'thursday', 'friday', 'saturday'];

        function getWeekParity() {
            const now = new Date();
            const start = new Date(now.getFullYear(), 0, 1);
            const days = Math.floor((now - start) / (24 * 60 * 60 * 1000));
            const weekNumber = Math.ceil((days + start.getDay() + 1) / 7);
            return weekNumber % 2 === 0 ? 'even' : 'odd';
        }

        function isCurrentPair(pairTime) {
            const now = new Date();
            const currentHour = now.getHours();
            const currentMinute = now.getMinutes();
            const [startHour, startMinute] = pairTime.split('-')[0].split(':').map(Number);
            const [endHour, endMinute] = pairTime.split('-')[1].split(':').map(Number);
            const startMinutes = startHour * 60 + startMinute;
            const endMinutes = endHour * 60 + endMinute;
            const currentMinutes = currentHour * 60 + currentMinute;
            return currentMinutes >= startMinutes && currentMinutes <= endMinutes;
        }

        function updateNextPair() {
            const now = new Date();
            const currentHour = now.getHours();
            const currentMinute = now.getMinutes();
            const currentDay = daysMap[now.getDay()];
            const weekType = getWeekParity();
            const schedule = getCurrentSchedule();
            const daySchedule = schedule[currentDay]?.[weekType];

            if (!daySchedule || Object.keys(daySchedule).length === 0) {
                document.getElementById('nextPairTime').innerHTML = '😴 Сегодня пар нет';
                document.getElementById('nextPairName').innerHTML = 'Отдыхай! 🎉';
                return;
            }

            let nextPair = null;
            let minDiff = Infinity;
            let currentPair = null;

            for (let pairNum in daySchedule) {
                const pair = daySchedule[pairNum];
                const [startHour, startMinute] = pair.time.split('-')[0].split(':').map(Number);
                const [endHour, endMinute] = pair.time.split('-')[1].split(':').map(Number);
                const startMinutes = startHour * 60 + startMinute;
                const endMinutes = endHour * 60 + endMinute;
                const currentMinutes = currentHour * 60 + currentMinute;

                if (currentMinutes >= startMinutes && currentMinutes <= endMinutes) {
                    currentPair = pair;
                    break;
                }

                const diff = startMinutes - currentMinutes;
                if (diff > 0 && diff < minDiff) {
                    minDiff = diff;
                    nextPair = pair;
                }
            }

            if (currentPair) {
                document.getElementById('nextPairTime').innerHTML = '🔥 Сейчас идёт!';
                document.getElementById('nextPairName').innerHTML = `${getEmojiForSubject(currentPair.name)} ${currentPair.name}`;
            } else if (nextPair) {
                const hours = Math.floor(minDiff / 60);
                const minutes = minDiff % 60;
                if (hours > 0) {
                    document.getElementById('nextPairTime').innerHTML = `⏰ Через ${hours} ч ${minutes} мин`;
                } else {
                    document.getElementById('nextPairTime').innerHTML = `⏰ Через ${minutes} мин`;
                }
                document.getElementById('nextPairName').innerHTML = `${getEmojiForSubject(nextPair.name)} ${nextPair.name}`;
            } else {
                document.getElementById('nextPairTime').innerHTML = '✅ Пары закончились';
                document.getElementById('nextPairName').innerHTML = 'Хорошего отдыха! 🌙';
            }
        }

                                <div class="week-badge">${weekName} неделя</div>
                            </div>
                            <div class="pairs-list">${pairsHtml}</div>
                        </div>
                    `;
                }
            }

            container.innerHTML = allDaysHtml;
        }

        function showTomorrow() {
            const tomorrowIndex = (new Date().getDay() + 1) % 7;
            const tomorrow = daysMap[tomorrowIndex];
            showSpecificDay(tomorrow);
        }

        function setGroup(group) {
            currentGroup = group;
            localStorage.setItem('currentGroup', group);

            document.querySelectorAll('.group-btn').forEach(btn => {
                if (btn.dataset.group == group) {
                    btn.classList.add('active');
                } else {
                    btn.classList.remove('active');
                }
            });

            renderFullSchedule();
            updateNextPair();
        }

        // ========== ЭМБИЕНТ МУЗЫКА ==========
        let audioContext = null;
        let isPlaying = false;
        let ambientEnabled = true;

        function startAmbientMusic() {
            if (!ambientEnabled) return;
            if (audioContext && isPlaying) return;
            try {
                audioContext = new (window.AudioContext || window.webkitAudioContext)();
                const gain = audioContext.createGain();
                gain.gain.value = 0.1;
                gain.connect(audioContext.destination);

                function playNote(freq, duration, delay) {
                    setTimeout(() => {
                        if (!audioContext || audioContext.state !== 'running' || !ambientEnabled) return;
                        const osc = audioContext.createOscillator();
                        const g = audioContext.createGain();
                        osc.type = 'sine';
                        osc.frequency.value = freq;
                        g.gain.value = 0.05;
                        osc.connect(g);
                        g.connect(gain);
                        osc.start();
                        g.gain.exponentialRampToValueAtTime(0.0001, audioContext.currentTime + duration);
                        osc.stop(audioContext.currentTime + duration);
                    }, delay * 1000);
                }

                function startLoop() {
                    if (!isPlaying || !ambientEnabled) return;
                    playNote(261.63, 4, 0);
                    playNote(329.63, 4, 2);
                    playNote(392.00, 4, 4);
                    playNote(523.25, 6, 6);
                    playNote(392.00, 4, 12);
                    playNote(329.63, 4, 14);
                    playNote(261.63, 6, 16);
                    setTimeout(startLoop, 22000);
                }

                audioContext.resume().then(() => {
                    isPlaying = true;
                    startLoop();
                });
            } catch(e) { console.log("🎵 Аудио не поддерживается"); }
        }

        function stopAmbientMusic() {
            if (audioContext) {
                audioContext.close();
                audioContext = null;
                isPlaying = false;
            }
        }

        function toggleAmbient() {
            ambientEnabled = !ambientEnabled;
            const btn = document.getElementById('ambientBtn');
            btn.classList.add('jump-animation');
            setTimeout(() => btn.classList.remove('jump-animation'), 300);

            if (ambientEnabled) {
                btn.innerHTML = '🎵 Эмбиент вкл';
                startAmbientMusic();
            } else {
                btn.innerHTML = '🔇 Эмбиент выкл';
                stopAmbientMusic();
            }
        }

        document.body.addEventListener('click', function initMusic() {
            if (ambientEnabled) startAmbientMusic();
            document.body.removeEventListener('click', initMusic);
        }, { once: true });

        // ========== QR-КОД ==========
        let qrVisible = false;
        let qrCodeInstance = null;

        function showQrCode() {
            const popup = document.getElementById('qrPopup');
            const overlay = document.getElementById('qrOverlay');
            popup.classList.add('show');
            overlay.classList.add('show');
            qrVisible = true;

            if (!qrCodeInstance) {
                qrCodeInstance = new QRCode(document.getElementById("qrCode"), {
                    text: window.location.href,
                    width: 180,
                    height: 180
                });
            }
        }

        function hideQrCode() {
            const popup = document.getElementById('qrPopup');
            const overlay = document.getElementById('qrOverlay');
            popup.classList.remove('show');
            overlay.classList.remove('show');
            qrVisible = false;
        }

        function toggleQrCode() {
            const btn = document.getElementById('qrToggleBtn');
            btn.classList.add('jump-animation');
            setTimeout(() => btn.classList.remove('jump-animation'), 300);

            if (qrVisible) {
                hideQrCode();
            } else {
                showQrCode();
            }
        }

        // ========== SHARE ==========
        async function shareSchedule() {
            const shareData = {
                title: '📚 Расписание РФ24-22Б',
                text: '🎓 Расписание занятий группы РФ24-22Б',
                url: window.location.href
            };

            try {
                if (navigator.share) {
                    await navigator.share(shareData);
                } else {
                    await navigator.clipboard.writeText(window.location.href);
                    alert('📋 Ссылка скопирована в буфер обмена!');
                }
            } catch (err) {
                console.log('Ошибка шаринга:', err);
            }
        }

        // ========== ГОЛОС ==========
        let recognition = null;
        if ('webkitSpeechRecognition' in window) {
            recognition = new webkitSpeechRecognition();
            recognition.lang = 'ru-RU';
            recognition.continuous = false;

            recognition.onresult = (event) => {
                const text = event.results[0][0].transcript.toLowerCase();
                document.getElementById('micBtn').classList.remove('listening');
                document.getElementById('micBtn').innerHTML = '🎤 Голос';

                if (text.includes('сегодня')) renderFullSchedule();
                else if (text.includes('завтра')) showTomorrow();
                else if (text.includes('понедельник')) showSpecificDay('monday');
                else if (text.includes('вторник')) showSpecificDay('tuesday');
                else if (text.includes('среда')) showSpecificDay('wednesday');
                else if (text.includes('четверг')) showSpecificDay('thursday');
                else if (text.includes('пятница')) showSpecificDay('friday');
                else if (text.includes('суббота')) showSpecificDay('saturday');
                else if (text.includes('первая подгруппа') || text.includes('1 подгруппа')) setGroup(1);
                else if (text.includes('вторая подгруппа') || text.includes('2 подгруппа')) setGroup(2);
                else if (text.includes('какая сейчас пара')) {
                    alert(document.getElementById('nextPairTime').innerText + ' ' + document.getElementById('nextPairName').innerText);
                }
                else alert('🗣️ Скажи: сегодня, завтра, день недели или подгруппа');
            };
        }

        document.getElementById('micBtn').onclick = () => {
            if (recognition) {
                recognition.start();
                document.getElementById('micBtn').classList.add('listening');
                document.getElementById('micBtn').innerHTML = '🎙️ Слушаю...';
                setTimeout(() => {
                    document.getElementById('micBtn').classList.remove('listening');
                    document.getElementById('micBtn').innerHTML = '🎤 Голос';
                }, 5000);
            } else {
                alert('🎤 Голосовое управление доступно в Chrome');
            }
        };

        // ========== ТЕМЫ ==========
        function setTheme(theme) {
            document.body.className = `theme-${theme}`;
            localStorage.setItem('theme', theme);
            document.querySelectorAll('.theme-btn').forEach(btn => {
                if (btn.dataset.theme === theme) btn.classList.add('active');
                else btn.classList.remove('active');
            });
        }

        document.querySelectorAll('.theme-btn').forEach(btn => {
            btn.onclick = () => setTheme(btn.dataset.theme);
        });

        document.querySelectorAll('.group-btn').forEach(btn => {
            btn.onclick = () => setGroup(parseInt(btn.dataset.group));
        });

        const savedTheme = localStorage.getItem('theme');
        if (savedTheme) setTheme(savedTheme);

        const savedGroup = localStorage.getItem('currentGroup');
        if (savedGroup) setGroup(parseInt(savedGroup));

        // ========== ЗАПУСК ==========
        document.getElementById('todayBtn').onclick = renderFullSchedule;
        document.getElementById('tomorrowBtn').onclick = showTomorrow;
        document.getElementById('daySelect').onchange = (e) => {
            if (e.target.value) showSpecificDay(e.target.value);
        };
        document.getElementById('ambientBtn').onclick = toggleAmbient;
        document.getElementById('qrToggleBtn').onclick = toggleQrCode;
        document.getElementById('closeQrBtn').onclick = hideQrCode;
        document.getElementById('qrOverlay').onclick = hideQrCode;
        document.getElementById('shareBtn').onclick = shareSchedule;

        setInterval(updateNextPair, 60000);
        updateNextPair();
        renderFullSchedule();

        // ========== ОНЛАЙН/ОФЛАЙН СТАТУС ==========
        window.addEventListener('online', () => {
            const toast = document.getElementById('offlineToast');
            toast.style.display = 'block';
            toast.style.background = '#34c759';
            toast.innerHTML = '🟢 Подключение восстановлено!';
            setTimeout(() => toast.style.display = 'none', 2500);
        });

        window.addEventListener('offline', () => {
            const toast = document.getElementById('offlineToast');
            toast.style.background = '#ff3b30';
            toast.style.display = 'block';
            toast.innerHTML = '📡 Нет подключения к интернету. Работаем офлайн 💾';
            setTimeout(() => toast.style.display = 'none', 4000);
        });

        // ========== РЕГИСТРАЦИЯ SERVICE WORKER ==========
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/sw.js')
                    .then(registration => {
                        console.log('✅ SW зарегистрирован:', registration.scope);
                        
                        registration.addEventListener('updatefound', () => {
                            const newWorker = registration.installing;
                            console.log('🔄 Обнаружено обновление SW');
                            
                            newWorker.addEventListener('statechange', () => {
                                if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
                                    console.log('🆕 Доступна новая версия!');
                                    if (confirm('📚 Доступна новая версия расписания. Обновить?')) {
                                        window.location.reload();
                                    }
                                }
                            });
                        });
                    })
                    .catch(error => {
                        console.log('❌ Ошибка регистрации SW:', error);
                    });
            });
        }

        if ('Notification' in window && Notification.permission === 'default') {
            Notification.requestPermission();
        }
    </script>
</body>
</html>

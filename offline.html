<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📡 Офлайн · Расписание</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Helvetica Neue', 'Segoe UI', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            text-align: center;
            padding: 20px;
        }
        .container {
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(20px);
            border-radius: 48px;
            padding: 48px 32px;
            max-width: 500px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 20px 60px rgba(0,0,0,0.2);
        }
        h1 {
            font-size: 120px;
            margin-bottom: 16px;
            line-height: 1;
        }
        h2 {
            font-size: 32px;
            margin-bottom: 16px;
            font-weight: 700;
        }
        p {
            font-size: 18px;
            opacity: 0.95;
            margin-bottom: 32px;
            line-height: 1.5;
        }
        .btn {
            background: white;
            color: #667eea;
            border: none;
            padding: 16px 36px;
            border-radius: 50px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            border: 1px solid rgba(255, 255, 255, 0.5);
            display: inline-flex;
            align-items: center;
            gap: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        .btn:hover {
            transform: scale(1.05);
            box-shadow: 0 8px 25px rgba(0,0,0,0.15);
        }
        .btn:active {
            transform: scale(0.98);
        }
        .hint {
            margin-top: 28px;
            font-size: 15px;
            opacity: 0.8;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .status-badge {
            display: inline-block;
            background: rgba(255,255,255,0.2);
            padding: 6px 16px;
            border-radius: 30px;
            font-size: 14px;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="status-badge">🔴 Нет соединения</div>
        <h1>📡</h1>
        <h2>Ты офлайн</h2>
        <p>Но расписание сохранено!<br>📚 Все пары доступны без интернета</p>
        <button class="btn" onclick="location.reload()">
            🔄 Обновить
        </button>
        <div class="hint">
            <span>💾 Данные в кеше</span>
            <span>•</span>
            <span>📅 Неделя загружена</span>
        </div>
    </div>
    <script>
        let checkInterval = setInterval(() => {
            if (navigator.onLine) {
                clearInterval(checkInterval);
                location.reload();
            }
        }, 3000);
        
        window.addEventListener('beforeunload', () => {
            clearInterval(checkInterval);
        });
    </script>
</body>
</html>
